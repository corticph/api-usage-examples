<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Corti AmbientScribe Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 2rem auto; }
    fieldset { margin-bottom: 1rem; }
    button { margin-right: 0.5rem; padding: 0.4rem 1rem; }
  </style>
</head>
<body>
  <h1>AmbientScribe</h1>

  <!-- Mode toggle -->
  <fieldset>
    <legend>Mode</legend>
    <label>
      <input type="radio" name="mode" value="single" checked />
      Single Microphone (diarization)
    </label>
    <br />
    <label>
      <input type="radio" name="mode" value="virtual" />
      Virtual Consultation (doctor + patient)
    </label>
  </fieldset>

  <!-- Remote source option (only relevant in virtual mode) -->
  <fieldset id="remote-source-options" style="display:none">
    <legend>Remote audio source</legend>
    <label>
      <input type="radio" name="remote-source" value="webrtc" checked />
      WebRTC peer connection
    </label>
    <br />
    <label>
      <input type="radio" name="remote-source" value="display" />
      Screen / tab capture (getDisplayMedia)
    </label>
  </fieldset>

  <script>
    // Show/hide remote source options when the mode changes.
    document.querySelectorAll('input[name="mode"]').forEach(function (radio) {
      radio.addEventListener("change", function () {
        document.getElementById("remote-source-options").style.display =
          this.value === "virtual" ? "" : "none";
      });
    });
  </script>

  <!-- Controls -->
  <button id="start-consultation">Start Consultation</button>
  <button id="end-consultation" disabled>End Consultation</button>

  <p><em>Open the browser console to see transcripts and facts.</em></p>

  <script type="module" src="./client.ts"></script>
</body>
</html>
